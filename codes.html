<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IGNITION</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
    }

    img {
      width: 100vw;          /* 모바일: 화면 가득 */
      max-width: 1440px;     /* 데스크탑: 1440px 제한 */
      height: auto;
      display: block;
      margin: 0 auto;        /* PC에서 가운데 정렬 */
    }
  </style>
</head>

<body>
  <img src="poster.png" alt="공연 정보 및 셋리스트" />
</body>
</html>
